# Reusable CI workflow for urirun connector packages (any language).
#
# A connector repo calls it instead of copying the same job:
#
#   name: ci
#   on: [push, pull_request]
#   jobs:
#     ci:
#       uses: if-uri/urirun/.github/workflows/connector-ci.yml@main
#       with:
#         lang: python   # or js | go | php
name: connector-ci

on:
  workflow_call:
    inputs:
      lang:
        description: "Connector language: python | js | go | php"
        type: string
        default: python
      python-version:
        type: string
        default: "3.12"
      node-version:
        type: string
        default: "20"
      go-version:
        type: string
        default: "1.21"
      php-version:
        type: string
        default: "8.3"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Python connector
        if: inputs.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - if: inputs.lang == 'python'
        env:
          # Contract gate ON in CI: runs the conformance tests that are skipif(not URIRUN_CONTRACT_CHECK)
          # and makes enforce() validate handler output at runtime. A gate that defaults off is a green
          # shim that silently lies. (The richer 7-gate ci/contract_ci.sh, which also needs node+go for
          # the polyglot checks, stays a dedicated `make contract-ci` target.)
          URIRUN_CONTRACT_CHECK: '1'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          make test

      - name: JS connector
        if: inputs.lang == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - if: inputs.lang == 'js'
        run: npm test

      - name: Go connector
        if: inputs.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - if: inputs.lang == 'go'
        run: go test ./...

      - name: PHP connector
        if: inputs.lang == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
      - if: inputs.lang == 'php'
        run: php test.php
