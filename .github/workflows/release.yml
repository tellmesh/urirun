name: release

on:
  push:
    tags: ["v*"]          # explicit release: publishes to PyPI AND cuts a GitHub Release
    branches: ["main"]    # auto-publish to PyPI whenever adapters/python/VERSION bumps

permissions:
  contents: write
  id-token: write   # PyPI Trusted Publishing (OIDC) — no token needed once configured

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Heal a partial `goal` bump: derive every version file from root VERSION so a
      # drifted commit still builds/publishes the right version (root VERSION is the
      # one file goal bumps reliably).
      - name: Sync versions from root VERSION
        run: make sync-versions

      - name: Resolve package version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # Idempotent gate: build/publish only when this version is not on PyPI yet, so
      # every main push doesn't republish — only the first push at a new version does.
      - name: Decide whether to publish
        id: gate
        run: |
          V="${{ steps.ver.outputs.version }}"
          if curl -fsS "https://pypi.org/pypi/urirun/$V/json" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "urirun $V already on PyPI — nothing to publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "urirun $V not on PyPI — will build and publish."
          fi

      - name: Check version metadata
        if: steps.gate.outputs.publish == 'true'
        run: make version-check

      - name: Check release tag matches package version
        if: steps.gate.outputs.publish == 'true' && startsWith(github.ref, 'refs/tags/')
        run: test "${GITHUB_REF_NAME}" = "v${{ steps.ver.outputs.version }}"

      - name: Build wheel + sdist
        if: steps.gate.outputs.publish == 'true'
        working-directory: adapters/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built wheel
        if: steps.gate.outputs.publish == 'true'
        working-directory: adapters/python
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          # Import the UNCONDITIONAL node/flow subpackages too: they resolve only if the extracted
          # urirun_node / urirun_flow / urirun_runtime / urirun_contracts / urirun_twin bodies are
          # bundled into the wheel (packages.find "urirun*"). A non-co-located future extraction would
          # still pass `import urirun.v2` but FAIL here — this is the gate that catches a "shim points at
          # an unbundled/unpublished package" break in a clean install BEFORE it reaches PyPI.
          /tmp/venv/bin/python -c "import urirun, urirun.v1, urirun.v2, urirun.node.mesh, urirun.node.flow; print('urirun', getattr(urirun,'__version__','?'), 'ok — node/flow subpackages bundled')"
          /tmp/venv/bin/urirun --help >/dev/null
          /tmp/venv/bin/urirun node serve --help >/dev/null   # exercises the CLI->mesh bridge (the "mesh not available" class)

      # PyPI Trusted Publishing (OIDC). Configure the publisher on pypi.org for
      # if-uri/urirun · workflow release.yml (this same file). No token needed.
      # If this step fails, OIDC isn't configured for this workflow — fix it there;
      # it is intentionally NOT continue-on-error so a non-publish is loud, not silent.
      - name: Publish to PyPI (Trusted Publishing)
        if: steps.gate.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: adapters/python/dist
          skip-existing: true   # tolerate races/re-runs; a real OIDC failure still errors loudly

      # --- GitHub Release assets: only for explicit v* tags ---
      - name: Package C adapter
        if: steps.gate.outputs.publish == 'true' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "adapters/python/dist/urirun-c-${VERSION}.tar.gz" \
            -C adapters/c urirun.c urirun.h urirun_test.c
          ls -l adapters/python/dist/urirun-c-*.tar.gz

      - name: Checksums
        if: steps.gate.outputs.publish == 'true' && startsWith(github.ref, 'refs/tags/')
        working-directory: adapters/python/dist
        run: |
          sha256sum urirun-* > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub Release
        if: steps.gate.outputs.publish == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            adapters/python/dist/*.whl
            adapters/python/dist/*.tar.gz
            adapters/python/dist/sha256sums.txt
          generate_release_notes: true
