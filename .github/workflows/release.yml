name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # PyPI Trusted Publishing (OIDC) — no token needed once configured

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version metadata
        run: make version-check

      - name: Check release tag matches package version
        run: |
          VERSION="$(cat adapters/python/VERSION)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Build wheel + sdist
        working-directory: adapters/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built wheel
        working-directory: adapters/python
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/python -c "import urirun, urirun.v1, urirun.v2; print('urirun', getattr(urirun,'__version__','?'), 'ok')"
          /tmp/venv/bin/urirun --help >/dev/null

      # Publish the Python adapter to PyPI. Runs here while dist/ holds only the
      # wheel + sdist (the C tarball is added in the next step). Uses PyPI Trusted
      # Publishing (OIDC) — configure a publisher (or "pending publisher" for the
      # first release) for if-uri/urirun · workflow release.yml on pypi.org.
      # continue-on-error keeps the proven GitHub Release working until that's set
      # up; drop it once PyPI publishing is confirmed.
      - name: Publish to PyPI (Trusted Publishing)
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: adapters/python/dist

      - name: Package C adapter
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "adapters/python/dist/urirun-c-${VERSION}.tar.gz" \
            -C adapters/c urirun.c urirun.h urirun_test.c
          ls -l adapters/python/dist/urirun-c-*.tar.gz

      - name: Checksums
        working-directory: adapters/python/dist
        run: |
          sha256sum urirun-* > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            adapters/python/dist/*.whl
            adapters/python/dist/*.tar.gz
            adapters/python/dist/sha256sums.txt
          generate_release_notes: true
