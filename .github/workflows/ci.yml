name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make version-check
      - name: Ruff lint (keep main green)
        run: |
          python -m pip install ruff
          make lint
      - name: Complexity gate (no Python function over CC=15)
        run: |
          python -m pip install radon
          make complexity
      - name: Extraction boundary gate (core-creep guard)
        run: |
          python scripts/extraction_audit.py --selftest
          PYTHONPATH=adapters/python python -m pytest -q \
            adapters/python/tests/test_scanner_extractable.py \
            adapters/python/tests/test_runtime_extractable.py
      - run: make test
      - name: Verify urirun[grpc] optional extra
        run: |
          python -m venv /tmp/grpc-venv
          /tmp/grpc-venv/bin/pip install "./adapters/python[grpc]"
          /tmp/grpc-venv/bin/python -c "import grpc, urirun; print('urirun[grpc] ok:', grpc.__version__)"
