<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>urirun v8 console</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">urirun v8</p>
          <h1>URI Command Console</h1>
        </div>
        <div class="metric">
          <span id="route-count">0</span>
          <small>routes</small>
        </div>
      </header>

      <section class="controls">
        <label class="switch">
          <input type="checkbox" id="execute-toggle">
          <span>Execute</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="shell-toggle">
          <span>Shell</span>
        </label>
        <button type="button" id="run-button">Run</button>
      </section>

      <section class="grid">
        <nav class="actions" id="actions" aria-label="URI routes"></nav>

        <section class="panel">
          <h2>Input</h2>
          <form id="input-form" class="form"></form>
        </section>

        <section class="panel result">
          <h2>Result</h2>
          <pre id="output">{}</pre>
        </section>

        <section class="panel logs">
          <h2>Logs</h2>
          <ul id="logs"></ul>
        </section>

        <section class="panel discover">
          <h2>Agent discovery (MCP / A2A)</h2>
          <p class="hint">How an LLM/agent finds &amp; calls these endpoints. Click a tool to call it.</p>
          <div class="discover-controls">
            <button type="button" id="mcp-tools-btn">MCP tools/list</button>
            <button type="button" id="a2a-card-btn">A2A agent card</button>
          </div>
          <div id="tool-list" class="tool-list"></div>
          <pre id="discover">{}</pre>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
