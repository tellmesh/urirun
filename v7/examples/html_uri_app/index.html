<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URI parameter console (v7)</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">urirun v7</p>
          <h1>URI Parameter Console</h1>
        </div>
        <div class="metric">
          <span id="route-count">0</span>
          <small>routes</small>
        </div>
      </header>

      <section class="controls">
        <label class="switch"><input type="checkbox" id="execute-toggle"><span>Execute <small>(off = dry-run)</small></span></label>
        <label class="switch"><input type="checkbox" id="confirm-toggle"><span>Confirm destructive</span></label>
        <div class="allow-box">
          <input type="text" id="allow-input" placeholder="allow glob, e.g. shell://**">
          <button id="add-allow" type="button">Add allow</button>
          <button id="reset-policy" type="button" class="ghost">Reset policy</button>
        </div>
        <div class="mode-tag">mode: <strong id="mode">dry-run</strong></div>
      </section>

      <section class="grid">
        <nav class="actions" id="actions" aria-label="URI endpoints"></nav>

        <section class="panel detail" id="detail"></section>

        <section class="panel result">
          <h2>Result envelope</h2>
          <pre id="output">{}</pre>
        </section>

        <section class="panel logs">
          <h2>Logs</h2>
          <ul id="logs"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
