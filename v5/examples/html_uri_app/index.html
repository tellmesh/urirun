<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URI bindings app</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">urihandler v5</p>
          <h1>URI Console</h1>
        </div>
        <div class="metric">
          <span id="route-count">0</span>
          <small>routes</small>
        </div>
      </header>

      <section class="grid">
        <nav class="actions" aria-label="URI actions">
          <h2>Actions</h2>
          <div class="action-list" id="actions"></div>
        </nav>

        <section class="panel">
          <h2>State</h2>
          <pre id="state">{}</pre>
        </section>

        <section class="panel result">
          <h2>Result</h2>
          <pre id="output">{}</pre>
        </section>

        <section class="panel logs">
          <h2>Logs</h2>
          <ul id="logs"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
