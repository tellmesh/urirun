todo:
  - id: urifix-connector-required-recovery
    priority: P0
    status: open
    summary: Turn connector_required into structured recovery with connector candidates and retry payload.
    acceptance:
      - Given a media:// or ssh:// route without connector, response contains recoveryUri urifix://host/chain/command/repair.
      - Recovery contains recommended connector package, install command and original retry payload.
      - Dashboard renders recovery as next action instead of a generic error.
  - id: side-effect-verification-contract
    priority: P0
    status: open
    summary: Require verification blocks on file writes, syncs, service restarts, deletes and deploys.
    acceptance:
      - Each side-effecting host dashboard route returns verification.expected and verification.actual.
      - Failed verification is retryable or has a human action.
      - Tests cover document sync, service restart and artifact delete.
  - id: route-executability-classification
    priority: P1
    status: open
    summary: Mark discovered routes as executable, metadata, connector_required or external.
    acceptance:
      - /api/summary and /api/objects include route executionState.
      - Discovery UI shows the state in the route list.
      - urirun host routes --json includes the same field.
  - id: api-device-capability-doctor
    priority: P1
    status: open
    summary: Add a doctor route for API/device nodes.
    acceptance:
      - Doctor reports authConfigured, endpoint reachability, protocol kind and connector requirement.
      - Doctor does not leak token values.
      - Tests cover HTTP API, RTSP device interface and missing auth.
  - id: service-lifecycle-standard
    priority: P1
    status: open
    summary: Normalize service lifecycle routes for chat and scanner services.
    routes:
      - service://host/<service>/query/status
      - service://host/<service>/command/start
      - service://host/<service>/command/restart
      - service://host/<service>/command/stop
    acceptance:
      - Restart uses port-owner detection and health check.
      - Chat logs the flow and verification.
      - Scanner and chat services share the same result shape.
  - id: non-http-device-connectors
    priority: P1
    status: open
    summary: Implement concrete connectors for RTSP/camera, SSH-device and fileshare/NAS.
    candidate_connectors:
      - urirun-connector-media
      - urirun-connector-camera-device
      - urirun-connector-ssh-device
      - urirun-connector-fileshare
    acceptance:
      - media:// stream route is owned by a real connector.
      - camera:// snapshot route can produce an artifact descriptor.
      - fs:// fileshare route can list files without pretending to be local fs.
      - ssh:// command route has auth and safe-command policy.
  - id: host-dashboard-split-api-node
    priority: P2
    status: open
    summary: Extract API/device node handling and URI invoke routing out of host_dashboard.py.
    candidate_modules:
      - urirun.host.configured_api
      - urirun.host.uri_invoke
      - urirun.host.dashboard_docs
    acceptance:
      - host_dashboard.py loses configured API helper functions.
      - Existing tests keep passing through compatibility wrappers.
  - id: widget-artifact-descriptor-sdk
    priority: P2
    status: open
    summary: Add a shared descriptor contract for services, widgets and artifacts.
    acceptance:
      - Connectors return artifact descriptors only.
      - Host/service registers final artifacts once.
      - Widgets carry live=true and refresh/data URI.
  - id: test-suite-sandbox-split
    priority: P2
    status: open
    summary: Make restricted-sandbox test runs meaningful.
    acceptance:
      - Duplicate test module names no longer cause import mismatch.
      - Socket-dependent tests are marked and skippable.
      - A documented host/CLI subset remains green without network/socket permissions.
  - id: webpage-auto-host-registration
    priority: P1
    status: open
    summary: Let webpage service register a page node directly in the host mesh when host callback auth is configured.
    acceptance:
      - Service can POST a signed add-node request to host dashboard.
      - Host config stores kind:webpage and relay URL without manual click.
      - Registration is opt-in and token/key protected.

